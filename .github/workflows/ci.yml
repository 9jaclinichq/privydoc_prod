name: PrivyDoc CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    name: Code Validation and Automated Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Project Dependencies
        run: |
          rm -f package-lock.json
          npm install
          npm install @tailwindcss/oxide-linux-x64-gnu --no-save

      - name: Run TypeScript Type Checker & Linter
        run: npm run lint

      - name: Execute Automated Test Suite (Unit, Integration & E2E Simulations)
        run: npm run test

      - name: Build Frontend Application & Compile Backend Server
        run: npm run build
        env:
          NODE_ENV: production

  deploy-staging:
    name: Build Container & Deploy to Staging
    needs: validate-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up GCP Credentials via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker credential helper
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Docker Container Image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Convert project ID to lowercase to satisfy Docker repository naming requirements
          PROJECT_ID_LOWER=$(echo "$PROJECT_ID" | tr '[:upper:]' '[:lower:]')
          docker build -t gcr.io/${PROJECT_ID_LOWER}/privydoc-app:${{ github.sha }} .
          docker push gcr.io/${PROJECT_ID_LOWER}/privydoc-app:${{ github.sha }}

      - name: Deploy to Cloud Run (Staging Revision)
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          PROJECT_ID_LOWER=$(echo "$PROJECT_ID" | tr '[:upper:]' '[:lower:]')
          
          # 1. Deploy Staging Service (with 100% traffic so we can run smoke tests on it)
          echo "Deploying to Staging Service: privydoc-app-staging"
          gcloud run deploy privydoc-app-staging \
            --image gcr.io/${PROJECT_ID_LOWER}/privydoc-app:${{ github.sha }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE=${{ secrets.SUPABASE_SERVICE_ROLE }}"
          
          # Explicitly force routing 100% traffic to the latest staging revision to bypass any stale traffic splits
          gcloud run services update-traffic privydoc-app-staging \
            --to-latest \
            --platform managed \
            --region ${{ secrets.GCP_REGION }}
          
          # 2. Deploy Production Service (staged with no traffic, ready for promotion)
          echo "Deploying to Production Service (No Traffic): privydoc-app"
          if gcloud run services describe privydoc-app --platform managed --region ${{ secrets.GCP_REGION }} >/dev/null 2>&1; then
            echo "Service privydoc-app exists. Deploying with --no-traffic."
            gcloud run deploy privydoc-app \
              --image gcr.io/${PROJECT_ID_LOWER}/privydoc-app:${{ github.sha }} \
              --platform managed \
              --region ${{ secrets.GCP_REGION }} \
              --no-traffic \
              --allow-unauthenticated \
              --revision-suffix=${{ github.sha }} \
              --set-env-vars="NODE_ENV=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE=${{ secrets.SUPABASE_SERVICE_ROLE }}"
          else
            echo "Service privydoc-app does not exist yet. Deploying initial revision."
            gcloud run deploy privydoc-app \
              --image gcr.io/${PROJECT_ID_LOWER}/privydoc-app:${{ github.sha }} \
              --platform managed \
              --region ${{ secrets.GCP_REGION }} \
              --allow-unauthenticated \
              --revision-suffix=${{ github.sha }} \
              --set-env-vars="NODE_ENV=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_ROLE=${{ secrets.SUPABASE_SERVICE_ROLE }}"
          fi

      - name: Run Staging Smoke Suite
        run: |
          STAGING_URL=$(gcloud run services describe privydoc-app-staging --platform managed --region ${{ secrets.GCP_REGION }} --format='value(status.url)')
          echo "Running Smoke Checks on $STAGING_URL..."
          
          echo "=== Debug: GET /healthz ==="
          curl -i "$STAGING_URL/healthz" || true
          echo ""
          
          echo "=== Debug: GET /api/config ==="
          curl -i "$STAGING_URL/api/config" || true
          echo ""
          
          echo "=== Running Strict Verifications ==="
          curl -f "$STAGING_URL/healthz" || exit 1
          curl -f "$STAGING_URL/api/config" || exit 1

  promote-production:
    name: Gated Promote to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production # Gates production promotion
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: Set up GCP Credentials via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Route 100% Traffic to New Container Revision
        run: |
          gcloud run services update-traffic privydoc-app \
            --to-revisions=privydoc-app-${{ github.sha }}=100 \
            --platform managed \
            --region ${{ secrets.GCP_REGION }}
